<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Interactivo DAMODA</title>
    <style>
        @font-face {
            font-family: 'Brolink Demo';
            src: url('Fonts/BrolinkDemo.woff2') format('woff2'),
                 url('Fonts/BrolinkDemo.otf') format('otf'),
                 url('Fonts/BrolinkDemo.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'Brolink Demo', sans-serif;
			background-color: #00CCFF; /* Agrega el color de fondo */
			position: relative; /* Necesario para posicionar la imagen */
        }

		#logo {
	    display: none; /* Se oculta la imagen usando css */
            "position: absolute; /* Posiciona la imagen respecto al body */"
            "top: 10px; /* Ajusta la distancia desde la parte superior */"
            "right: 20px; /* Ajusta la distancia desde la derecha */"
            "width: 150px; /* Ajusta el ancho de la imagen */"
            "height: auto; /* Mantiene la proporción de la imagen */"
        }
        .item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .item input[type="checkbox"] {
            margin-right: 10px;
        }

        .item.done {
            text-decoration: line-through;
            color: gray;
        }

        #resetButton {
            display: block;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <img id="logo" src="images/AION.png" alt="Logo"> <h1>Checklist AION DAMODA</h1>
    <div id="checklist">
        <div class="item">
            <input type="checkbox" id="tarea1">
            <label for="tarea1">Montaje Aps , RTK y Lora, Switch y laptop(Cable azul RTK, encender RTK y Lora, comprobar la carga de bateria en ambos)</label>
        </div>
        <div class="item">
            <input type="checkbox" id="tarea2">
            <label for="tarea2">Montaje del grid segun el archivo drama, poner spare drones seoparados del grid para diferenciarlos</label>
        </div>
        <div class="item">
            <input type="checkbox" id="tarea3">
            <label for="tarea3">Comprobar direccion de los drones y colocaion del dron correcta</label>
        </div>
         <div class="item">
            <input type="checkbox" id="tarea4">
            <label for="tarea4">En drones V3 comprobar que la tapa de la bateria esta asegurada y el seguro de las cajas retirado</label>
        </div>
        <div class="item">
            <input type="checkbox" id="tarea5">
            <label for="tarea5">En drones V4 comprobar carga del batery pack y asegurar que los drones estan cargando</label>
        </div>
        <div class="item">
            <input type="checkbox" id="tarea6">
            <label for="tarea6">Abrir la app DGCS y setear la configuracion de red (seleccionar el adaptador)</label>
        </div>
        <div class="item">
            <input type="checkbox" id="tarea7">
            <label for="tarea7">Configuracion Aps, checar canales libre de wifi (dmd y canales)</label>
        </div>
        <div class="item">
            <input type="checkbox" id="tarea8">
            <label for="tarea8">Conectar RTK a DGCS (Comprobar puerto COM)</label>
        </div>
        <div class="item">
            <input type="checkbox" id="tarea9">
            <label for="tarea9">Encender drones</label>
        </div>
        <div class="item">
            <input type="checkbox" id="tarea10">
            <label for="tarea9">Comprobar que estan todos conectados y sin problemas</label>
        </div>
		<div class="item">
            <input type="checkbox" id="tarea11">
            <label for="tarea11">Comprobar calidad de GPS, carga de bateria y recepcion de radio</label>
        </div>
        <div class="item">
            <input type="checkbox" id="tarea12">
            <label for="tarea12">Cargar Drama aL DGCS</label>
        </div>
        <div class="item">
            <input type="checkbox" id="tarea13">
            <label for="tarea13">Definir altura de drama y alturas de TakeOff y Landing asegurando los posibles obstaculos alrededor (altura de drama y TO and Land Altitud no pueden tener una diferencia de 10 y 8 metros)</label>
        </div>
        <div class="item">
            <input type="checkbox" id="tarea14">
            <label for="tarea14">Ajustar posicion de drama sobre el grid de los drones y orientacion</label>
        </div>
        <div class="item">
            <input type="checkbox" id="tarea15">
            <label for="tarea15">Asignar drama a los drones y seleccionar drones alternativos</label>
        </div>
		<div class="item">
            <input type="checkbox" id="tarea16">
            <label for="tarea16">Comprobar que no hay cruces en el grid</label>
        </div>
         <div class="item">
            <input type="checkbox" id="tarea17">
            <label for="tarea17">Setear tiempos de coreo</label>
        </div>
        <div class="item">
            <input type="checkbox" id="tarea18">
            <label for="tarea18">Previsualizar drama para comprobar que no hay choques en la coreo</label>
        </div>
        <div class="item">
            <input type="checkbox" id="tarea19">
            <label for="tarea19">Cargar drama a los drones y comprobar</label>
        </div>
         <div class="item">
            <input type="checkbox" id="tarea20">
            <label for="tarea20">Cerrar permison del RC, Poner G-mode, Armar drones y apagar luces indicadoras</label>
        </div>
         <div class="item">
            <input type="checkbox" id="tarea21">
            <label for="tarea21">Chequeo de status de los drones</label>
        </div>
		<div class="item">
            <input type="checkbox" id="tarea22">
            <label for="tarea22">LAUNCH COREO</label>
        </div>
    </div>
    <button id="resetButton">Reiniciar Checklist</button>

    <script>
        const checklist = document.getElementById('checklist');
        const resetButton = document.getElementById('resetButton');

        checklist.addEventListener('change', function(event) {
            if (event.target.type === 'checkbox') {
                const label = event.target.parentElement;
                label.classList.toggle('done', event.target.checked);
            }
        });

        resetButton.addEventListener('click', function() {
            const checkboxes = checklist.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                checkbox.checked = false;
                checkbox.parentElement.classList.remove('done');
            });
        });
    </script>
</body>
</html>
